<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0e12" />
    <title>VAL 触控练枪场</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <canvas id="game-canvas" aria-label="游戏画布"></canvas>

    <div id="hud">
      <div class="hud-block">
        <span class="hud-label">分数</span>
        <span id="hud-score" class="hud-value accent">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">命中率</span>
        <span id="hud-acc" class="hud-value">—</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">剩余时间</span>
        <span id="hud-time" class="hud-value">30s</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">连击</span>
        <span id="hud-combo" class="hud-value combo">—</span>
      </div>
    </div>

    <p id="zone-hint">
      左手区射击 · 右手区拖移准星（绝对跟手）
    </p>

    <div id="toast" role="status" aria-live="polite"></div>

    <div id="overlay">
      <div class="panel" id="panel-menu">
        <h1>触控练枪场</h1>
        <p class="sub">
          30 秒挑战：静态靶、移动靶与反应靶混合。连击加分；内圈为爆头。
        </p>

        <div class="controls-row">
          <label for="sensitivity">灵敏度（相对屏幕中心缩放）</label>
          <input
            id="sensitivity"
            type="range"
            min="50"
            max="150"
            value="100"
          />
          <div id="sensitivity-val" class="range-value">1.00</div>
        </div>
        <div class="controls-row">
          <label for="smooth">跟手度（越大越贴手指，1=几乎无延迟）</label>
          <input id="smooth" type="range" min="55" max="100" value="88" />
          <div id="smooth-val" class="range-value">0.88</div>
        </div>
        <div class="controls-row">
          <label for="recoil">后坐力强度</label>
          <input id="recoil" type="range" min="0" max="200" value="100" />
          <div id="recoil-val" class="range-value">1.00</div>
        </div>

        <p id="best-score" class="best-score">
          最高分：<strong>0</strong>（本地）
        </p>

        <div class="btn-row">
          <button type="button" class="primary" id="btn-start">开始</button>
        </div>
      </div>

      <div class="panel hidden" id="panel-end">
        <h1 id="end-title">回合结束</h1>
        <p class="sub" id="end-detail"></p>
        <div class="btn-row">
          <button type="button" class="primary" id="btn-restart">
            重新开始
          </button>
        </div>
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/targets.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
